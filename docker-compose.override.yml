# Local dev overrides: hot-reload, exposed debug ports
services:
  backend:
    command: uvicorn studio.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      - LOG_LEVEL=DEBUG

  worker:
    volumes:
      - .:/app
      - /home/geva/.local/share/claude/versions/2.1.153:/home/geva/.local/bin/claude:ro
    environment:
      - LOG_LEVEL=DEBUG
